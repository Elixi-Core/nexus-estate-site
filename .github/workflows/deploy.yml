name: Build & deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Project-pages repos serve at https://<user>.github.io/<repo>/, so we need
      # a /<repo>/ base. For a user-pages repo (<user>.github.io), set BASE_URL=/.
      BASE_URL: /nexus-estate-site/
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_N8N_BASE: ${{ secrets.VITE_N8N_BASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # `cache: 'npm'` disabled — needs a committed lockfile to work.
          # Re-enable once you run `npm install` locally and commit package-lock.json.

      # Using `npm install` (not `npm ci`) so the build works without a committed
       # package-lock.json. If you ever run `npm install` locally and commit the
       # lockfile, you can switch this back to `npm ci` for faster, deterministic builds.
      - run: npm install

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
